ekf_filter:
  ros__parameters:
    # overridden to true by sim.launch.py for unity. default false for real hardware.
    use_sim_time: false
    frequency: 50.0
    two_d_mode: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # /imu/data_raw → madgwick → /imu/data
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_remove_gravitational_acceleration: true

    twist0: /dvl/twist_stamped
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  true,  true,
                    false, false, false,
                    false, false, false]