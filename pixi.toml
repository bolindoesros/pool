[workspace]
name = "loki_ws_copy"
channels = ["robostack-jazzy", "conda-forge"]
platforms = ["linux-aarch64"]

[dependencies]
# Base ROS dependencies
ros-jazzy-ros-base = "*"
pkg-config = "*"
compilers = "*"
make = "*"
ninja = ">=1.13.2,<2"
ros-jazzy-ros2cli = "*"

# Build tools
colcon-common-extensions = "*"
cmake = "<4"

# Workspace dependencies
pyserial = "*"
ros-jazzy-ament-cmake = "*"
ros-jazzy-ament-lint-auto = "*"
ros-jazzy-ament-lint-common = "*"
ros-jazzy-builtin-interfaces = "*"
ros-jazzy-foxglove-bridge = "*"
ros-jazzy-geometry-msgs = "*"
ros-jazzy-imu-filter-madgwick = "*"
ros-jazzy-nav-msgs = "*"
ros-jazzy-rclcpp = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-robot-localization = "*"
ros-jazzy-rosidl-default-generators = "*"
ros-jazzy-rosidl-default-runtime = "*"
ros-jazzy-sensor-msgs = "*"
ros-jazzy-std-msgs = "*"
ros-jazzy-std-srvs = "*"
ros-jazzy-tf2 = "*"
ros-jazzy-tf2-ros = "*"

[tasks]
build = {cmd = "colcon build --symlink-install", description = "Build the ROS workspace"}
clean = {cmd = "rm -rf build install log", description = "Clean build artifacts (build, install, log directories)"}

start = {cmd = "scripts/start_agent.sh"}
stop = {cmd = "scripts/stop_agent.sh"}

main = {cmd = "ros2 launch loki_bringup real.launch.py", description = "Launch the main ROS node"}
sim = {cmd = "ros2 launch loki_bringup sim.launch.py", description = "Launch the Unity sim stack (ros_tcp_endpoint + ekf + controller + monitor)"}
foxglove = {cmd = "ros2 launch foxglove_bridge foxglove_bridge_launch.xml", description = "Foxglove"}
arm = {cmd = "ros2 service call /system/arm std_srvs/srv/SetBool \"{data: true}\"", description = "Arm the system (service hosted by hw_bridge)"}
disarm = {cmd = "ros2 service call /system/arm std_srvs/srv/SetBool \"{data: false}\"", description = "Disarm the system"}
hw = {cmd = "ros2 run loki_actuators hw_bridge", description = "Launch the hardware bridge"}


servo-test = {cmd = "ros2 run loki_bringup servo_test.py", description = "Sweep fin servos (arm first)"}
teleop = {cmd = "ros2 run loki_bringup teleop.py", description = "Keyboard remote control for thrusters and fin servos (press 'a' to arm)"}
current = {cmd = "ros2 run loki_bringup current_test.py", description = "Direct current command to VESCs up to 25A"}


sim-ps = {cmd = "scripts/sim_ps.sh", description = "List sim.launch.py nodes and whether :10000 is held"}
sim-kill = {cmd = "scripts/sim_ps.sh --kill", description = "Stop the sim stack (SIGINT launch tree, SIGKILL stragglers, free :10000)"}

mag-calib = {cmd = "ros2 run loki_icm mag_calib_node.py --ros-args --params-file src/loki_bringup/config/mag_calib_params.yaml", description = "Magnetometer calibration node (/imu/mag_raw → hard iron correction → /imu/mag)"}
mag-cal = {cmd = "ros2 run loki_bringup mag_calibrate.py", description = "Collect mag samples and compute hard iron offsets (spin vehicle 2x 360 yaw, then paste output into mag_calib_params.yaml)"}

vesc-ps = {cmd = "scripts/vesc_ps.sh", description = "List vesc_node processes, their serial ports, and stale handles"}
vesc-kill = {cmd = "scripts/vesc_ps.sh --kill", description = "Stop all vesc_node processes (SIGINT first, thruster zeroed)"}


vesc1 = {cmd = "ros2 run loki_vesc vesc_node --ros-args -r __node:=vesc_driver_1 -r __ns:=/vesc1 -r vesc/commands/duty_cycle:=/vesc/commands/duty_cycle -r vesc/commands/current:=/vesc/commands/current -r vesc/commands/rpm:=/vesc/commands/rpm --params-file src/loki_bringup/config/vesc_params.yaml", description = "Run VESC driver for thruster 1 (bench test, telemetry under /vesc1)"}
vesc2 = {cmd = "ros2 run loki_vesc vesc_node --ros-args -r __node:=vesc_driver_2 -r __ns:=/vesc2 -r vesc/commands/duty_cycle:=/vesc/commands/duty_cycle -r vesc/commands/current:=/vesc/commands/current -r vesc/commands/rpm:=/vesc/commands/rpm --params-file src/loki_bringup/config/vesc_params.yaml", description = "Run VESC driver for thruster 2 (bench test, telemetry under /vesc2)"}

rosbag = {cmd = "mkdir -p logs && cd logs && ros2 bag record -a --exclude-topics /path/ekf /path/ground_truth", description = "Record all topics (minus Path trails) to a timestamped bag under logs/"}
# Scripts to source on environment activation, found after first colcon build.
[activation]
scripts = ["install/setup.bash"]

# colours
[target.linux-aarch64.activation.env]
RCUTILS_COLORIZED_OUTPUT = "1"
RCUTILS_CONSOLE_OUTPUT_FORMAT = "[{severity}] [{name}]: {message}"