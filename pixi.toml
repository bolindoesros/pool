[workspace]
name = "loki_ws_copy"
channels = ["https://prefix.dev/robostack-jazzy", "https://prefix.dev/conda-forge"]
platforms = ["linux-aarch64"]

[dependencies]
# Base ROS dependencies
ros-jazzy-ros-base = "*"
pkg-config = "*"
compilers = "*"
make = "*"
ninja = "*"
ros-jazzy-ros2cli = "*"

# Build tools
colcon-common-extensions = "*"
cmake = "<4"

# Workspace dependencies
pyserial = "*"
ros-jazzy-ament-cmake = "*"
ros-jazzy-ament-lint-auto = "*"
ros-jazzy-ament-lint-common = "*"
ros-jazzy-builtin-interfaces = "*"
ros-jazzy-foxglove-bridge = "*"
ros-jazzy-geometry-msgs = "*"
ros-jazzy-imu-filter-madgwick = "*"
ros-jazzy-nav-msgs = "*"
ros-jazzy-rclcpp = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-robot-localization = "*"
ros-jazzy-rosidl-default-generators = "*"
ros-jazzy-rosidl-default-runtime = "*"
ros-jazzy-sensor-msgs = "*"
ros-jazzy-std-msgs = "*"
ros-jazzy-std-srvs = "*"
ros-jazzy-tf2 = "*"
ros-jazzy-tf2-ros = "*"

[pypi-dependencies]


# The following packages were not found:
# ament_python = "*"
# ros_tcp_endpoint = "*"

[tasks]
build = {cmd = "colcon build --symlink-install", description = "Build the ROS workspace"}
clean = {cmd = "rm -rf build install log", description = "Clean build artifacts (build, install, log directories)"}
main = {cmd = "ros2 launch loki_bringup real.launch.py", description = "Launch the main ROS node"}

# Scripts to source on environment activation, found after first colcon build.

[activation]
scripts = ["install/setup.bash"]