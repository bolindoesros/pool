[workspace]
name = "loki_ws_copy"
channels = ["robostack-jazzy", "conda-forge"]
platforms = ["linux-aarch64"]

[dependencies]
# Base ROS dependencies
ros-jazzy-ros-base = "*"
pkg-config = "*"
compilers = "*"
make = "*"
ninja = ">=1.13.2,<2"
ros-jazzy-ros2cli = "*"

# Build tools
colcon-common-extensions = "*"
cmake = "<4"

# Workspace dependencies
pyserial = "*"
ros-jazzy-ament-cmake = "*"
ros-jazzy-ament-lint-auto = "*"
ros-jazzy-ament-lint-common = "*"
ros-jazzy-builtin-interfaces = "*"
ros-jazzy-foxglove-bridge = "*"
ros-jazzy-geometry-msgs = "*"
ros-jazzy-imu-filter-madgwick = "*"
ros-jazzy-nav-msgs = "*"
ros-jazzy-rclcpp = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-robot-localization = "*"
ros-jazzy-rosidl-default-generators = "*"
ros-jazzy-rosidl-default-runtime = "*"
ros-jazzy-sensor-msgs = "*"
ros-jazzy-std-msgs = "*"
ros-jazzy-std-srvs = "*"
ros-jazzy-tf2 = "*"
ros-jazzy-tf2-ros = "*"

[tasks]
build = {cmd = "colcon build --symlink-install", description = "Build the ROS workspace"}
clean = {cmd = "rm -rf build install log", description = "Clean build artifacts (build, install, log directories)"}

start = {cmd = "scripts/start_agent.sh"}
stop = {cmd = "scripts/stop_agent.sh"}

main = {cmd = "ros2 launch loki_bringup real.launch.py", description = "Launch the main ROS node"}
foxglove = {cmd = "ros2 launch foxglove_bridge foxglove_bridge_launch.xml", description = "Foxglove"}
arm = {cmd = "ros2 service call /system/arm std_srvs/srv/SetBool \"{data: true}\"", description = "Arm the system"}


hw = {cmd = "ros2 run loki_actuators hw_bridge", description = "Launch the hardware bridge"}

vesc-ps = {cmd = "scripts/vesc_ps.sh", description = "List vesc_node processes, their serial ports, and stale handles"}
vesc-kill = {cmd = "scripts/vesc_ps.sh --kill", description = "Stop all vesc_node processes (SIGINT first, thruster zeroed)"}
vesc1 = {cmd = "ros2 run loki_vesc vesc_node --ros-args -r __node:=vesc_driver_1 --params-file src/loki_bringup/config/vesc_params.yaml", description = "Run VESC driver for thruster 1 (bench test, config from vesc_params.yaml)"}
vesc2 = {cmd = "ros2 run loki_vesc vesc_node --ros-args -r __node:=vesc_driver_2 --params-file src/loki_bringup/config/vesc_params.yaml", description = "Run VESC driver for thruster 2 (bench test, config from vesc_params.yaml)"}

# Scripts to source on environment activation, found after first colcon build.
[activation]
scripts = ["install/setup.bash"]

# colours
[target.linux-aarch64.activation.env]
RCUTILS_COLORIZED_OUTPUT = "1"
RCUTILS_CONSOLE_OUTPUT_FORMAT = "[{severity}] [{name}]: {message}"